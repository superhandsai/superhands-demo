# Runs a static Superhands design-system check when someone comments:
#
#   /superhands check
#
# This first-test workflow does not install dependencies, check out the PR, run
# app code, or use a Superhands token. It fetches PR diffs through GitHub's API
# with the built-in GITHUB_TOKEN, sends them to Superhands, then
# posts the rendered result back to the PR.
#
# Template v3 sends only unified diffs. Superhands reconstructs compact base
# and head hunk fragments from each patch, so no complete file contents leave
# the repository and no per-file contents API requests are needed.
#
# Security invariants (keep on every revision):
# - PR/comment text never appears inside ${{ }} in run: blocks — event data
#   is read via jq from $GITHUB_EVENT_PATH only.
# - URLs are built from API-returned shas and @uri-encoded path segments,
#   never from branch names or titles.
# - Only OWNER/MEMBER/COLLABORATOR comments trigger the check.

name: Superhands check

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    env:
      SUPERHANDS_URL: ${{ vars.SUPERHANDS_URL }}
      GH_TOKEN: ${{ github.token }}
      GITHUB_API_URL: ${{ github.api_url }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Check command
        id: command
        shell: bash
        run: |
          set -euo pipefail

          command="$(jq -r '.comment.body | split("\n") | map(gsub("^[[:space:]]+|[[:space:]]+$"; "")) | map(select(length > 0)) | .[0] // ""' "$GITHUB_EVENT_PATH")"
          association="$(jq -r '.comment.author_association // ""' "$GITHUB_EVENT_PATH")"
          case "$association" in
            OWNER|MEMBER|COLLABORATOR) allowed=true ;;
            *) allowed=false ;;
          esac
          if [ "$command" = "/superhands check" ] && [ "$allowed" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect PR diffs
        if: steps.command.outputs.should_run == 'true'
        id: payload
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPERHANDS_URL:-}" ]; then
            echo "Set the SUPERHANDS_URL repository variable to your Superhands deployment." >&2
            exit 1
          fi

          tmpdir="$(mktemp -d)"
          pr_number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"
          comment_id="$(jq -r '.comment.id' "$GITHUB_EVENT_PATH")"
          requester="$(jq -r '.comment.user.login' "$GITHUB_EVENT_PATH")"

          api() {
            curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$@"
          }

          pr_json="$tmpdir/pr.json"
          files_json="$tmpdir/files.json"
          payload_json="$tmpdir/payload.json"
          collected_json="$tmpdir/collected.json"
          skipped_json="$tmpdir/skipped.json"
          echo "[]" > "$collected_json"
          echo "[]" > "$skipped_json"
          total_patch_bytes=0

          api "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/$pr_number" > "$pr_json"
          echo "[]" > "$files_json"
          for page in $(seq 1 30); do
            page_json="$tmpdir/files-page-$page.json"
            api "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pulls/$pr_number/files?per_page=100&page=$page" > "$page_json"
            jq -s '.[0] + .[1]' "$files_json" "$page_json" > "$tmpdir/files.next"
            mv "$tmpdir/files.next" "$files_json"
            if [ "$(jq 'length' "$page_json")" -lt 100 ]; then
              break
            fi
          done

          head_sha="$(jq -r '.head.sha' "$pr_json")"
          pr_title="$(jq -r '.title' "$pr_json")"

          jq -c '.[]' "$files_json" | while IFS= read -r file; do
            path="$(jq -r '.filename' <<< "$file")"
            status="$(jq -r '.status' <<< "$file")"
            patch="$(jq -r '.patch // ""' <<< "$file")"

            if [ "$status" = "removed" ]; then
              jq --arg path "$path" '. + [{path: $path, reason: "deleted"}]' "$skipped_json" > "$tmpdir/skipped.next"
              mv "$tmpdir/skipped.next" "$skipped_json"
              continue
            fi

            case "$path" in
              *.tsx|*.jsx|*.ts|*.js|*.css|*.html) ;;
              *)
                jq --arg path "$path" '. + [{path: $path, reason: "non-visual"}]' "$skipped_json" > "$tmpdir/skipped.next"
                mv "$tmpdir/skipped.next" "$skipped_json"
                continue
                ;;
            esac

            count="$(jq 'length' "$collected_json")"
            if [ "$count" -ge 20 ]; then
              jq --arg path "$path" '. + [{path: $path, reason: "capped"}]' "$skipped_json" > "$tmpdir/skipped.next"
              mv "$tmpdir/skipped.next" "$skipped_json"
              continue
            fi

            if [ -z "$patch" ]; then
              jq --arg path "$path" '. + [{path: $path, reason: "missing-diff"}]' "$skipped_json" > "$tmpdir/skipped.next"
              mv "$tmpdir/skipped.next" "$skipped_json"
              continue
            fi

            patch_bytes="$(printf '%s' "$patch" | wc -c | tr -d ' ')"
            if [ "$patch_bytes" -gt 1000000 ] || [ "$((total_patch_bytes + patch_bytes))" -gt 4000000 ]; then
              jq --arg path "$path" '. + [{path: $path, reason: "too-large"}]' "$skipped_json" > "$tmpdir/skipped.next"
              mv "$tmpdir/skipped.next" "$skipped_json"
              continue
            fi
            total_patch_bytes="$((total_patch_bytes + patch_bytes))"

            jq \
              --arg path "$path" \
              --arg status "$status" \
              --arg patch "$patch" \
              '. + [{path: $path, status: $status, patch: $patch}]' \
              "$collected_json" > "$tmpdir/collected.next"
            mv "$tmpdir/collected.next" "$collected_json"
          done

          jq -n \
            --arg repoFullName "$GITHUB_REPOSITORY" \
            --argjson prNumber "$pr_number" \
            --arg prTitle "$pr_title" \
            --arg headSha "$head_sha" \
            --argjson commentId "$comment_id" \
            --arg requester "$requester" \
            --slurpfile files "$collected_json" \
            --slurpfile skipped "$skipped_json" \
            '{
              repoFullName: $repoFullName,
              prNumber: $prNumber,
              prTitle: $prTitle,
              headSha: $headSha,
              commentId: $commentId,
              requester: $requester,
              files: $files[0],
              skipped: $skipped[0]
            }' > "$payload_json"

          # JSON escaping can make the request larger than the raw patch byte
          # count. Keep the serialized body below the route's 4 MiB limit,
          # dropping files loudly instead of letting the endpoint reject it.
          max_payload_bytes=3800000
          while [ "$(wc -c < "$payload_json" | tr -d ' ')" -gt "$max_payload_bytes" ]; do
            if [ "$(jq '.files | length' "$payload_json")" -eq 0 ]; then
              echo "Superhands payload metadata exceeds the request limit." >&2
              exit 1
            fi
            dropped_path="$(jq -r '.files[-1].path' "$payload_json")"
            jq --arg path "$dropped_path" \
              '.files = .files[:-1] | .skipped += [{path: $path, reason: "capped"}]' \
              "$payload_json" > "$tmpdir/payload.next"
            mv "$tmpdir/payload.next" "$payload_json"
          done

          echo "path=$payload_json" >> "$GITHUB_OUTPUT"

      - name: Run Superhands static check
        if: steps.command.outputs.should_run == 'true'
        id: superhands
        shell: bash
        run: |
          set -euo pipefail

          response="$(mktemp)"
          curl --fail-with-body --silent --show-error \
            -H "Content-Type: application/json" \
            --data @"${{ steps.payload.outputs.path }}" \
            "$SUPERHANDS_URL/api/github/action-check" > "$response"

          jq -r '.comment' "$response" > superhands-comment.md
          echo "conclusion=$(jq -r '.conclusion' "$response")" >> "$GITHUB_OUTPUT"

      - name: Post Superhands result
        if: steps.command.outputs.should_run == 'true'
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          jq -n --rawfile body superhands-comment.md '{body: $body}' > comment.json
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data @comment.json \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments"

      - name: Fail job on Superhands findings
        if: steps.command.outputs.should_run == 'true' && steps.superhands.outputs.conclusion == 'failure'
        run: exit 1
